<!doctype html>
<html lang="zh-CN">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>登录 — 工程招投标管理系统</title>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Noto Sans", Helvetica, Arial, sans-serif;
  font-size: 14px;
  line-height: 1.5;
  color: #1f2328;
  background: #f6f8fa;
  min-height: 100vh;
  display: flex;
  flex-direction: column;
}
a { color: #0969da; text-decoration: none; }
a:hover { text-decoration: underline; }
.topbar {
  background: #24292f;
  padding: 12px 24px;
  display: flex;
  align-items: center;
  gap: 12px;
}
.topbar-logo {
  color: #fff;
  font-size: 14px;
  font-weight: 600;
  display: flex;
  align-items: center;
  gap: 8px;
}
.topbar-back {
  color: #8b949e;
  font-size: 12px;
  margin-left: auto;
  text-decoration: none;
}
.topbar-back:hover { color: #fff; text-decoration: none; }
.auth-wrapper {
  flex: 1;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 40px 16px;
}
.auth-card {
  width: 100%;
  max-width: 340px;
}
.auth-logo-area {
  text-align: center;
  margin-bottom: 20px;
}
.auth-logo-area .logo-icon {
  width: 48px;
  height: 48px;
  background: #24292f;
  border-radius: 10px;
  display: inline-flex;
  align-items: center;
  justify-content: center;
  margin-bottom: 12px;
}
.auth-logo-area h1 {
  font-size: 20px;
  font-weight: 600;
  color: #1f2328;
}
.form-box {
  background: #fff;
  border: 1px solid #d0d7de;
  border-radius: 6px;
  padding: 24px;
  margin-bottom: 12px;
}
.form-box h2 {
  font-size: 15px;
  font-weight: 600;
  margin-bottom: 20px;
  text-align: center;
}
.form-group { margin-bottom: 16px; }
.form-group label {
  display: flex;
  justify-content: space-between;
  align-items: center;
  font-size: 13px;
  font-weight: 600;
  margin-bottom: 6px;
  color: #1f2328;
}
.form-group label a { font-weight: 400; font-size: 12px; }
input[type="email"], input[type="password"], input[type="text"] {
  width: 100%;
  padding: 5px 12px;
  font-size: 14px;
  font-family: inherit;
  color: #1f2328;
  background: #fff;
  border: 1px solid #d0d7de;
  border-radius: 6px;
  outline: none;
  line-height: 1.5;
  transition: border-color 80ms, box-shadow 80ms;
}
input:focus {
  border-color: #0969da;
  box-shadow: 0 0 0 3px rgba(9,105,218,0.3);
}
.btn {
  display: block;
  width: 100%;
  padding: 5px 16px;
  font-size: 14px;
  font-family: inherit;
  font-weight: 600;
  line-height: 20px;
  border-radius: 6px;
  border: 1px solid;
  cursor: pointer;
  text-align: center;
  transition: background 80ms;
}
.btn-primary {
  background: #1f883d;
  color: #fff;
  border-color: rgba(31,35,40,0.15);
  box-shadow: 0 1px 0 rgba(31,35,40,0.1);
}
.btn-primary:hover { background: #1a7f37; }
.error-banner {
  background: #ffebe9;
  border: 1px solid #ffcecb;
  border-radius: 6px;
  padding: 10px 12px;
  font-size: 13px;
  color: #82071e;
  margin-bottom: 16px;
  display: flex;
  align-items: flex-start;
  gap: 8px;
}
.error-banner svg { flex-shrink: 0; margin-top: 1px; }
.lock-notice {
  background: #fff8c5;
  border: 1px solid #e3b341;
  border-radius: 6px;
  padding: 10px 12px;
  font-size: 12px;
  color: #7d4e00;
  margin-bottom: 16px;
}
.divider {
  font-size: 12px;
  color: #656d76;
  text-align: center;
  margin: 12px 0;
  position: relative;
}
.divider::before {
  content: '';
  position: absolute;
  top: 50%;
  left: 0; right: 0;
  height: 1px;
  background: #d0d7de;
}
.divider span {
  position: relative;
  background: #fff;
  padding: 0 8px;
}
.secondary-box {
  background: #fff;
  border: 1px solid #d0d7de;
  border-radius: 6px;
  padding: 14px 24px;
  text-align: center;
  font-size: 13px;
  color: #656d76;
}
.help-text {
  font-size: 12px;
  color: #656d76;
  margin-top: 6px;
}
/* State: locked */
body.state-locked .lock-notice { display: block; }
body:not(.state-locked) .lock-notice { display: none; }
body.state-error .error-banner { display: flex; }
body:not(.state-error) .error-banner { display: none; }
/* Tabs for state demo */
.demo-bar {
  display: flex;
  gap: 6px;
  margin-bottom: 16px;
  background: #fff;
  border: 1px solid #d0d7de;
  border-radius: 6px;
  padding: 8px 12px;
  font-size: 11px;
  color: #656d76;
  align-items: center;
  flex-wrap: wrap;
}
.demo-bar span { font-weight: 600; color: #1f2328; }
.demo-btn {
  padding: 2px 8px;
  border-radius: 4px;
  border: 1px solid #d0d7de;
  background: #f6f8fa;
  font-size: 11px;
  cursor: pointer;
  color: #1f2328;
}
.demo-btn:hover { background: #eaeef2; }
@media (max-width: 400px) {
  .form-box { padding: 20px 16px; }
}
</style>
</head>
<body>

<nav class="topbar">
  <div class="topbar-logo">
    <svg width="18" height="18" viewBox="0 0 18 18" fill="none">
      <rect x="1" y="3" width="16" height="12" rx="2" stroke="white" stroke-width="1.5"/>
      <path d="M5 7h8M5 10.5h5" stroke="white" stroke-width="1.5" stroke-linecap="round"/>
    </svg>
    MPC · 工程招投标管理系统
  </div>
  <a class="topbar-back" href="../index.html">← 返回导航</a>
</nav>

<div class="auth-wrapper">
  <div class="auth-card">

    <!-- Demo state switcher -->
    <div class="demo-bar">
      <span>状态预览：</span>
      <button class="demo-btn" onclick="document.body.className=''">默认</button>
      <button class="demo-btn" onclick="document.body.className='state-error'">密码错误</button>
      <button class="demo-btn" onclick="document.body.className='state-locked'">账号锁定</button>
    </div>

    <div class="auth-logo-area">
      <div class="logo-icon">
        <svg width="26" height="26" viewBox="0 0 26 26" fill="none">
          <rect x="2" y="5" width="22" height="16" rx="3" stroke="white" stroke-width="1.8"/>
          <path d="M7 10h12M7 14h8" stroke="white" stroke-width="1.8" stroke-linecap="round"/>
        </svg>
      </div>
      <h1>登录账号</h1>
    </div>

    <div class="form-box">
      <!-- Error state -->
      <div class="error-banner">
        <svg width="14" height="14" viewBox="0 0 16 16" fill="none"><path d="M8 1.5a6.5 6.5 0 1 0 0 13 6.5 6.5 0 0 0 0-13ZM0 8a8 8 0 1 1 16 0A8 8 0 0 1 0 8Zm8-3a.75.75 0 0 1 .75.75v3a.75.75 0 0 1-1.5 0v-3A.75.75 0 0 1 8 5Zm0 6.5a1 1 0 1 1 0-2 1 1 0 0 1 0 2Z" fill="#82071e"/></svg>
        密码不正确，请重新输入。还有 3 次机会，失败后账号将被锁定 30 分钟。
      </div>
      <!-- Lock state -->
      <div class="lock-notice">
        ⚠️ 账号已因多次密码错误被锁定，请 <strong>30 分钟</strong>后再试，或通过邮件重置密码。
      </div>

      <div class="form-group">
        <label for="email">电子邮件地址</label>
        <input type="email" id="email" name="email" placeholder="name@company.com" value="zhangsan@abc.com" autocomplete="email">
      </div>
      <div class="form-group">
        <label for="password">
          密码
          <a href="#">忘记密码？</a>
        </label>
        <input type="password" id="password" name="password" placeholder="输入密码" autocomplete="current-password">
      </div>
      <button type="button" class="btn btn-primary" onclick="handleLogin()">登录</button>
    </div>

    <div class="secondary-box">
      没有账号？<a href="auth-register.html">注册并创建公司</a>
    </div>

  </div>
</div>

<script>
function handleLogin() {
  const email = document.getElementById('email').value;
  const password = document.getElementById('password').value;
  if (!email || !password) {
    document.body.className = 'state-error';
    return;
  }
  // Simulate success
  window.location.href = '../screens/dashboard.html';
}
</script>

</body>
</html>
