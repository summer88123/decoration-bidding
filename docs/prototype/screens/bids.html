<!doctype html>
<html lang="zh-CN">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>投标工作台 — 投标管理系统</title>
<style>
:root {
  --bg: #ffffff; --surface: #f6f8fa; --fg: #1f2328; --muted: #656d76;
  --border: #d0d7de; --accent: #0969da; --accent-hover: #0550ae;
  --success: #1a7f37; --danger: #cf222e; --warning: #9a6700;
  --done: #8250df; --font: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
  --mono: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace; --radius: 6px;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: var(--font); font-size: 14px; color: var(--fg); background: var(--bg); line-height: 1.5; }
a { color: var(--accent); text-decoration: none; }
a:hover { text-decoration: underline; }
.proto-nav {
  background: #1c2128; border-bottom: 1px solid #30363d;
  padding: 6px 16px; display: flex; align-items: center; gap: 12px;
  font-size: 12px; position: sticky; top: 0; z-index: 9999;
}
.proto-nav a { color: #8b949e; text-decoration: none; display: flex; align-items: center; gap: 4px; }
.proto-nav a:hover { color: #e6edf3; }
.proto-nav .proto-divider { color: #30363d; }
.proto-nav .proto-current { color: #e6edf3; font-weight: 500; }
.app { display: grid; grid-template-columns: 240px 1fr; min-height: calc(100vh - 32px); }
@media (max-width: 1011px) { .app { grid-template-columns: 1fr; } }
.sidebar {
  background: var(--surface); border-right: 1px solid var(--border);
  padding: 16px 0; position: sticky; top: 32px; height: calc(100vh - 32px); overflow-y: auto;
}
@media (max-width: 1011px) { .sidebar { display: none; } }
.sidebar-logo { display: flex; align-items: center; gap: 8px; padding: 0 16px 16px; border-bottom: 1px solid var(--border); font-weight: 600; font-size: 15px; }
.sidebar-nav { padding: 8px 0; }
.nav-section-label { font-size: 11px; font-weight: 600; color: var(--muted); text-transform: uppercase; letter-spacing: 0.05em; padding: 8px 16px 4px; }
.nav-item { display: flex; align-items: center; gap: 8px; padding: 6px 16px; color: var(--fg); font-size: 13px; cursor: pointer; }
.nav-item:hover { background: rgba(0,0,0,0.04); text-decoration: none; }
.nav-item.active { background: #ddf4ff; color: var(--accent); font-weight: 600; }
.nav-item svg { width: 16px; height: 16px; flex-shrink: 0; }
.sidebar-user { position: absolute; bottom: 0; left: 0; right: 0; border-top: 1px solid var(--border); padding: 12px 16px; display: flex; align-items: center; gap: 8px; background: var(--surface); }
.user-avatar { width: 28px; height: 28px; border-radius: 50%; background: var(--accent); color: #fff; display: flex; align-items: center; justify-content: center; font-size: 12px; font-weight: 600; flex-shrink: 0; }
.user-info { flex: 1; min-width: 0; }
.user-name { font-size: 12px; font-weight: 600; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.user-email { font-size: 11px; color: var(--muted); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.main { display: flex; flex-direction: column; }
.page-header { padding: 20px 24px 16px; border-bottom: 1px solid var(--border); display: flex; align-items: flex-start; justify-content: space-between; gap: 16px; }
.page-title { font-size: 20px; font-weight: 600; }
.page-subtitle { font-size: 12px; color: var(--muted); margin-top: 2px; }
.btn { display: inline-flex; align-items: center; gap: 6px; padding: 5px 16px; border-radius: var(--radius); font-size: 14px; font-family: var(--font); cursor: pointer; border: 1px solid transparent; font-weight: 400; }
.btn-primary { background: #1f883d; color: #fff; border-color: rgba(31,35,40,.15); }
.btn-primary:hover { background: var(--success); }
.btn-default { background: var(--surface); color: var(--fg); border-color: var(--border); }
.btn-default:hover { background: #f3f4f6; }
.btn-sm { padding: 3px 12px; font-size: 12px; }
.filter-area { padding: 12px 24px; border-bottom: 1px solid var(--border); display: flex; align-items: center; gap: 8px; flex-wrap: wrap; }
.search-input { padding: 5px 12px; border: 1px solid var(--border); border-radius: var(--radius); font-size: 14px; font-family: var(--font); background: var(--bg); color: var(--fg); width: 240px; }
.search-input:focus { outline: none; border-color: var(--accent); box-shadow: 0 0 0 3px rgba(9,105,218,.3); }
.filter-tabs { display: flex; gap: 2px; flex-wrap: wrap; }
.filter-tab { padding: 5px 12px; border-radius: var(--radius); font-size: 12px; cursor: pointer; border: 1px solid var(--border); background: var(--bg); color: var(--muted); }
.filter-tab.active { background: var(--accent); color: #fff; border-color: var(--accent); }
.filter-tab:hover:not(.active) { background: var(--surface); }
.badge { display: inline-flex; align-items: center; padding: 2px 8px; border-radius: 9999px; font-size: 11px; font-weight: 500; white-space: nowrap; }
.badge-draft { background: #f6f8fa; color: var(--muted); border: 1px solid var(--border); }
.badge-review { background: #fff8c5; color: var(--warning); }
.badge-approved { background: #dafbe1; color: var(--success); }
.badge-submitted { background: #ddf4ff; color: var(--accent); }
.badge-won { background: #1a7f37; color: #fff; }
.badge-lost { background: #ffebe9; color: var(--danger); }
table { width: 100%; border-collapse: collapse; border: 1px solid var(--border); border-radius: var(--radius); overflow: hidden; }
thead tr { background: var(--surface); }
th { padding: 10px 16px; text-align: left; font-size: 12px; font-weight: 600; color: var(--muted); border-bottom: 1px solid var(--border); white-space: nowrap; }
td { padding: 10px 16px; font-size: 14px; vertical-align: middle; border-bottom: 1px solid var(--border); }
tbody tr:last-child td { border-bottom: none; }
tbody tr:hover { background: var(--surface); }
.progress-bar { height: 4px; background: var(--border); border-radius: 2px; width: 80px; }
.progress-fill { height: 100%; border-radius: 2px; background: var(--accent); }
</style>
</head>
<body>
<nav class="proto-nav">
  <a href="../index.html">
    <svg width="14" height="14" viewBox="0 0 16 16" fill="currentColor"><path d="M6.906.664a1.749 1.749 0 012.187 0l5.25 4.2c.415.332.657.835.657 1.367v7.019A1.75 1.75 0 0113.25 15h-3.5a.75.75 0 01-.75-.75V9H7v5.25a.75.75 0 01-.75.75h-3.5A1.75 1.75 0 011 13.25V6.23c0-.531.242-1.034.657-1.366l5.25-4.2z"/></svg>
    页面导航
  </a>
  <span class="proto-divider">/</span>
  <span class="proto-current">投标工作台</span>
</nav>
<div class="app">
  <aside class="sidebar">
    <div class="sidebar-logo">
      <svg width="20" height="20" viewBox="0 0 20 20" fill="none"><rect width="20" height="20" rx="4" fill="#0969da"/><path d="M5 10h10M10 5v10" stroke="#fff" stroke-width="2" stroke-linecap="round"/></svg>
      投标管理系统
    </div>
    <nav class="sidebar-nav">
      <div class="nav-section-label">核心功能</div>
      <a class="nav-item" href="dashboard.html">
        <svg viewBox="0 0 16 16" fill="currentColor"><path d="M0 1.75A.75.75 0 01.75 1h14.5a.75.75 0 010 1.5H.75A.75.75 0 010 1.75zM0 8a.75.75 0 01.75-.75h14.5a.75.75 0 010 1.5H.75A.75.75 0 010 8zm0 6.25a.75.75 0 01.75-.75h14.5a.75.75 0 010 1.5H.75a.75.75 0 01-.75-.75z"/></svg>
        商机仪表板
      </a>
      <a class="nav-item" href="tenders.html">
        <svg viewBox="0 0 16 16" fill="currentColor"><path d="M0 1.75C0 .784.784 0 1.75 0h12.5C15.216 0 16 .784 16 1.75v9.5A1.75 1.75 0 0114.25 13H8.06l-2.573 2.573A1.458 1.458 0 013 14.543V13H1.75A1.75 1.75 0 010 11.25zm1.75-.25a.25.25 0 00-.25.25v9.5c0 .138.112.25.25.25h2a.75.75 0 01.75.75v2.19l2.72-2.72a.749.749 0 01.53-.22h6.5a.25.25 0 00.25-.25v-9.5a.25.25 0 00-.25-.25z"/></svg>
        招标项目
      </a>
      <a class="nav-item active" href="bids.html">
        <svg viewBox="0 0 16 16" fill="currentColor"><path d="M1.75 1h8.5c.966 0 1.75.784 1.75 1.75v5.5A1.75 1.75 0 0110.25 10H7.061l-2.574 2.573A1.458 1.458 0 012 11.543V10h-.25A1.75 1.75 0 010 8.25v-5.5C0 1.784.784 1 1.75 1zM1.5 2.75v5.5c0 .138.112.25.25.25h1a.75.75 0 01.75.75v2.19l2.72-2.72a.749.749 0 01.53-.22h3.5a.25.25 0 00.25-.25v-5.5a.25.25 0 00-.25-.25h-8.5a.25.25 0 00-.25.25z"/></svg>
        投标工作台
      </a>
      <div class="nav-section-label">管理</div>
      <a class="nav-item" href="settings.html">
        <svg viewBox="0 0 16 16" fill="currentColor"><path d="M8 0a8 8 0 100 16A8 8 0 008 0zm0 1.5a6.5 6.5 0 110 13 6.5 6.5 0 010-13z"/></svg>
        组织设置
      </a>
    </nav>
    <div class="sidebar-user">
      <div class="user-avatar">S</div>
      <div class="user-info">
        <div class="user-name">summer88123</div>
        <div class="user-email">summer88123@163.com</div>
      </div>
    </div>
  </aside>

  <div class="main">
    <div class="page-header">
      <div>
        <div class="page-title">投标工作台</div>
        <div class="page-subtitle">管理所有进行中的投标</div>
      </div>
    </div>
    <div class="filter-area">
      <input class="search-input" type="text" placeholder="搜索项目名称..." id="searchInput">
      <div class="filter-tabs" id="filterTabs">
        <button class="filter-tab active" data-status="all">全部</button>
        <button class="filter-tab" data-status="DRAFT">草稿</button>
        <button class="filter-tab" data-status="IN_REVIEW">审查中</button>
        <button class="filter-tab" data-status="APPROVED">已批准</button>
        <button class="filter-tab" data-status="SUBMITTED">已提交</button>
        <button class="filter-tab" data-status="WON">已中标</button>
        <button class="filter-tab" data-status="LOST">未中标</button>
      </div>
    </div>

    <div style="padding: 0 24px 24px; flex: 1;">
      <table id="bidTable">
        <thead>
          <tr>
            <th>投标项目</th>
            <th>版本</th>
            <th>截标日期</th>
            <th>完成进度</th>
            <th style="text-align:right;">总报价</th>
            <th>状态</th>
            <th style="text-align:right;">操作</th>
          </tr>
        </thead>
        <tbody id="bidBody"></tbody>
      </table>
      <div id="tableFooter" style="padding: 10px 0; font-size: 12px; color: var(--muted);"></div>
    </div>
  </div>
</div>

<script>
const STATUS_LABELS = {
  DRAFT: '草稿', IN_REVIEW: '审查中', APPROVED: '已批准',
  SUBMITTED: '已提交', WON: '已中标', LOST: '未中标'
};
const STATUS_CLASS = {
  DRAFT: 'badge-draft', IN_REVIEW: 'badge-review', APPROVED: 'badge-approved',
  SUBMITTED: 'badge-submitted', WON: 'badge-won', LOST: 'badge-lost'
};

const bids = [
  { id: 1, title: '尖东商业大厦 B2 层装修工程', version: 'A 方案', deadline: '2026-05-22', progress: 85, quote: 2980000, status: 'IN_REVIEW' },
  { id: 2, title: '观塘工业邨厂房翻新项目', version: '主方案', deadline: '2026-06-15', progress: 60, quote: 1720000, status: 'DRAFT' },
  { id: 3, title: '沙田第一城商场公共区域翻新', version: 'A 方案', deadline: '2026-07-01', progress: 40, quote: null, status: 'DRAFT' },
  { id: 4, title: '沙田第一城商场公共区域翻新', version: 'B 方案（低价）', deadline: '2026-07-01', progress: 25, quote: null, status: 'DRAFT' },
  { id: 5, title: '红磡海逸豪园会所改造', version: '主方案', deadline: '2026-04-30', progress: 100, quote: 950000, status: 'SUBMITTED' },
  { id: 6, title: '铜锣湾时代广场零售单元改装', version: '主方案', deadline: '2026-08-10', progress: 100, quote: 2150000, status: 'WON' },
];

let currentStatus = 'all';
let searchTerm = '';

function formatQuote(v) {
  if (!v) return '—';
  return 'HK$' + (v >= 1000000 ? (v/1000000).toFixed(2) + 'M' : (v/1000).toFixed(0) + 'K');
}

function render() {
  let rows = bids.filter(b => {
    if (currentStatus !== 'all' && b.status !== currentStatus) return false;
    if (searchTerm && !b.title.includes(searchTerm)) return false;
    return true;
  });
  const tbody = document.getElementById('bidBody');
  tbody.innerHTML = rows.map(b => `
    <tr>
      <td>
        <a href="bid-workspace.html" style="color: var(--accent); font-weight: 500;">${b.title}</a>
        <div style="font-size: 11px; color: var(--muted); margin-top: 1px;">${b.version}</div>
      </td>
      <td style="color: var(--muted); font-size: 12px;">${b.version}</td>
      <td style="font-size: 13px;">${b.deadline || '—'}</td>
      <td>
        <div style="display: flex; align-items: center; gap: 8px;">
          <div class="progress-bar"><div class="progress-fill" style="width: ${b.progress}%"></div></div>
          <span style="font-size: 11px; color: var(--muted); font-variant-numeric: tabular-nums;">${b.progress}%</span>
        </div>
      </td>
      <td style="text-align:right; font-variant-numeric: tabular-nums;">${formatQuote(b.quote)}</td>
      <td><span class="badge ${STATUS_CLASS[b.status]}">${STATUS_LABELS[b.status]}</span></td>
      <td style="text-align:right; white-space: nowrap;">
        <a href="bid-workspace.html" class="btn btn-default btn-sm">编辑</a>
        ${b.status === 'APPROVED' ? '<a href="bid-workspace.html" class="btn btn-primary btn-sm" style="margin-left: 4px;">提交</a>' : ''}
      </td>
    </tr>
  `).join('');
  document.getElementById('tableFooter').textContent = `共 ${rows.length} 条记录`;
}

document.getElementById('filterTabs').addEventListener('click', e => {
  const btn = e.target.closest('.filter-tab');
  if (!btn) return;
  document.querySelectorAll('.filter-tab').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  currentStatus = btn.dataset.status;
  render();
});

document.getElementById('searchInput').addEventListener('input', e => {
  searchTerm = e.target.value.trim();
  render();
});

render();
</script>
</body>
</html>
