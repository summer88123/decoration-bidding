<!doctype html>
<html lang="zh-CN">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>用户故事 — 装修投标辅助系统</title>
<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Noto Sans SC", Helvetica, Arial, sans-serif;
  font-size: 15px;
  line-height: 1.7;
  color: #1f2328;
  background: #f6f8fa;
}
.topbar {
  background: #24292f;
  padding: 12px 24px;
  display: flex;
  align-items: center;
  gap: 16px;
  position: sticky;
  top: 0;
  z-index: 100;
}
.topbar a {
  color: #cdd9e5;
  text-decoration: none;
  font-size: 14px;
}
.topbar a:hover { color: #fff; }
.topbar-title { color: #fff; font-weight: 600; font-size: 15px; }
.topbar-sep { color: #555; }
.layout {
  display: flex;
  max-width: 1200px;
  margin: 0 auto;
  padding: 32px 24px;
  gap: 32px;
}
.sidebar {
  width: 220px;
  flex-shrink: 0;
}
.sidebar-sticky {
  position: sticky;
  top: 72px;
}
.sidebar-title {
  font-size: 11px;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: 0.08em;
  color: #8c959f;
  margin-bottom: 10px;
}
.sidebar nav a {
  display: flex;
  align-items: center;
  gap: 8px;
  padding: 6px 10px;
  border-radius: 6px;
  text-decoration: none;
  font-size: 13px;
  color: #1f2328;
  cursor: pointer;
  transition: background 0.1s;
  margin-bottom: 2px;
}
.sidebar nav a:hover, .sidebar nav a.active {
  background: #ddf4ff;
  color: #0969da;
}
.sidebar nav a .num {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  width: 20px;
  height: 20px;
  border-radius: 50%;
  background: #e8f4fb;
  color: #0969da;
  font-size: 11px;
  font-weight: 700;
  flex-shrink: 0;
}
.main {
  flex: 1;
  min-width: 0;
}
.doc-card {
  background: #fff;
  border: 1px solid #d0d7de;
  border-radius: 12px;
  padding: 36px 40px;
  margin-bottom: 24px;
}
/* Markdown styles */
.doc-card h1 { font-size: 24px; margin-bottom: 16px; padding-bottom: 12px; border-bottom: 1px solid #e8eaed; }
.doc-card h2 { font-size: 18px; margin: 24px 0 12px; color: #1f2328; }
.doc-card h3 { font-size: 15px; margin: 18px 0 8px; color: #444d56; }
.doc-card h4 { font-size: 14px; margin: 14px 0 6px; color: #656d76; }
.doc-card p { margin-bottom: 12px; }
.doc-card ul, .doc-card ol { margin: 8px 0 12px 20px; }
.doc-card li { margin-bottom: 4px; }
.doc-card code {
  background: #f0f3f6;
  border: 1px solid #e1e4e8;
  border-radius: 4px;
  padding: 1px 5px;
  font-family: "SFMono-Regular", Consolas, monospace;
  font-size: 13px;
}
.doc-card pre {
  background: #f6f8fa;
  border: 1px solid #e1e4e8;
  border-radius: 8px;
  padding: 16px;
  overflow-x: auto;
  margin: 12px 0;
}
.doc-card pre code {
  background: none;
  border: none;
  padding: 0;
  font-size: 13px;
}
.doc-card table {
  width: 100%;
  border-collapse: collapse;
  margin: 12px 0;
  font-size: 14px;
}
.doc-card th {
  background: #f6f8fa;
  padding: 8px 12px;
  text-align: left;
  border: 1px solid #d0d7de;
  font-weight: 600;
}
.doc-card td {
  padding: 8px 12px;
  border: 1px solid #d0d7de;
}
.doc-card tr:hover td { background: #f9fafb; }
.doc-card blockquote {
  border-left: 4px solid #0969da;
  padding: 8px 16px;
  background: #f0f7ff;
  border-radius: 0 6px 6px 0;
  margin: 12px 0;
  color: #444d56;
}
.doc-card hr {
  border: none;
  border-top: 1px solid #e8eaed;
  margin: 20px 0;
}
.doc-card a { color: #0969da; }
.loading {
  text-align: center;
  color: #8c959f;
  padding: 40px;
}
@media (max-width: 700px) {
  .layout { flex-direction: column; }
  .sidebar { width: 100%; }
  .sidebar-sticky { position: static; }
}
</style>
</head>
<body>
<div class="topbar">
  <a href="../index.html">装修投标辅助系统</a>
  <span class="topbar-sep">/</span>
  <span class="topbar-title">用户故事</span>
</div>
<div class="layout">
  <div class="sidebar">
    <div class="sidebar-sticky">
      <div class="sidebar-title">文档目录</div>
      <nav id="nav">
        <a onclick="loadDoc('00-data-model.md', this)" id="nav-data-model"><span class="num">00</span> 数据模型</a>
        <a onclick="loadDoc('01-auth.md', this)" id="nav-auth"><span class="num">01</span> 认证模块</a>
        <a onclick="loadDoc('02-organization.md', this)" id="nav-org"><span class="num">02</span> 组织管理</a>
        <a onclick="loadDoc('03-tender.md', this)" id="nav-tender"><span class="num">03</span> 招标管理</a>
        <a onclick="loadDoc('04-bid.md', this)" id="nav-bid"><span class="num">04</span> 投标模块</a>
      </nav>
    </div>
  </div>
  <div class="main">
    <div id="content" class="doc-card">
      <div class="loading">正在加载文档…</div>
    </div>
  </div>
</div>
<script>
const hash2file = {
  'data-model': '00-data-model.md',
  'auth': '01-auth.md',
  'org': '02-organization.md',
  'tender': '03-tender.md',
  'bid': '04-bid.md',
};
let currentActive = null;
async function loadDoc(filename, el) {
  const content = document.getElementById('content');
  content.innerHTML = '<div class="loading">加载中…</div>';
  if (currentActive) currentActive.classList.remove('active');
  if (el) { el.classList.add('active'); currentActive = el; }
  try {
    const res = await fetch(filename);
    if (!res.ok) throw new Error('fetch failed');
    const md = await res.text();
    content.innerHTML = marked.parse(md);
  } catch(e) {
    content.innerHTML = '<div class="loading">文档加载失败，请确认文件存在。</div>';
  }
}
// initial load from hash
const h = (location.hash || '#data-model').replace('#','');
const initFile = hash2file[h] || '00-data-model.md';
const initNavId = 'nav-' + h;
const initEl = document.getElementById(initNavId) || document.getElementById('nav-data-model');
loadDoc(initFile, initEl);
</script>
</body>
</html>
